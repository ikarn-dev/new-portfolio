<!-- GITHUB CONTRIBUTIONS -->
<div class="section-label" style="text-align: center;">contributions</div>
<div class="heatmap-wrapper">
  <div class="heatmap-header">
    <span class="heatmap-total" id="heatmap-total"></span>
    <div class="heatmap-years" id="heatmap-years"></div>
  </div>
  <div class="heatmap-outer">
    <div class="heatmap-day-labels">
      <div class="heatmap-day-spacer"></div>
      <span>Sun</span>
      <span>Mon</span>
      <span>Tue</span>
      <span>Wed</span>
      <span>Thu</span>
      <span>Fri</span>
      <span>Sat</span>
    </div>
    <div class="heatmap-scroll-area">
      <div class="heatmap-months" id="heatmap-months"></div>
      <div id="github-heatmap" class="github-heatmap"></div>
    </div>
  </div>
  <div class="heatmap-legend">
    <span>Less</span>
    <div class="heatmap-legend-cell" data-level="0"></div>
    <div class="heatmap-legend-cell" data-level="1"></div>
    <div class="heatmap-legend-cell" data-level="2"></div>
    <div class="heatmap-legend-cell" data-level="3"></div>
    <div class="heatmap-legend-cell" data-level="4"></div>
    <span>More</span>
  </div>
  <div class="heatmap-stats" id="heatmap-stats"></div>
</div>
